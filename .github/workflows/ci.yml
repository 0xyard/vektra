name: macOS build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (xcodebuild)
        run: |
          xcodebuild \
            -project "Vektra.xcodeproj" \
            -target "Vektra" \
            -configuration Debug \
            -destination 'platform=macOS' \
            build

